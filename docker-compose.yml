

services:
  # PHP Application
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: escoffienews_app
    restart: unless-stopped
    tty: true
    environment:
      SERVICE_NAME: app
      SERVICE_TAGS: dev
    working_dir: /var/www
    volumes:
      - .:/var/www
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - escoffienews_network

  # Nginx Web Server
  web:
    image: nginx:alpine
    container_name: escoffienews_web
    restart: unless-stopped
    tty: true
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/conf.d/:/etc/nginx/conf.d/
    networks:
      - escoffienews_network

  # Reverb WebSocket Server
  reverb:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: escoffienews_reverb
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    ports:
      - "8080:8080"
    volumes:
      - .:/var/www
    networks:
      - escoffienews_network
    depends_on:
      - db
      - redis

  # Database
  db:
    image: mysql:8.0
    container_name: escoffienews_db
    restart: unless-stopped
    tty: true
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: escoffienews
      MYSQL_ROOT_PASSWORD: root
      MYSQL_PASSWORD: root
      MYSQL_USER: escoffienews
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - escoffienews_network

  # Redis for Queue/Cache/Broadcasting
  redis:
    image: redis:alpine
    container_name: escoffienews_redis
    restart: unless-stopped
    networks:
      - escoffienews_network

  # Frontend (React)
  frontend:
    image: node:20-alpine
    container_name: escoffienews_frontend
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./frontend:/app
      - ./.env:/app/.env
    ports:
      - "3000:3000"
    command: sh -c "npm install && npm run dev -- --host"
    networks:
      - escoffienews_network

networks:
  escoffienews_network:
    driver: bridge

volumes:
  dbdata:
    driver: local
